<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>H13 Uitspraak — Datum & tijd</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, Arial, sans-serif;
    background: #f5f5f5;
    padding: 20px 16px 40px;
    max-width: 480px;
    margin: 0 auto;
  }
  .header {
    background: #004848;
    color: white;
    border-radius: 12px;
    padding: 18px 20px 14px;
    margin-bottom: 20px;
  }
  .header h1 { font-size: 1.1em; opacity: 0.85; font-weight: 400; }
  .header h2 { font-size: 1.5em; font-weight: 700; margin: 4px 0 8px; }
  .header p  { font-size: 0.88em; opacity: 0.9; line-height: 1.4; }
  .words { display: flex; flex-direction: column; gap: 12px; }
  .word-btn {
    background: white;
    border: 2px solid #004848;
    border-radius: 14px;
    padding: 16px 20px;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .word-btn:active, .word-btn.playing { background: #e0e9e9; }
  .word-btn .icon { font-size: 1.8em; flex-shrink: 0; width: 1.8em; text-align: center; }
  .word-btn .text { flex: 1; }
  .word-btn .fr { font-size: 1.25em; font-weight: 700; color: #1a1a1a; }
  .word-btn .ph { font-size: 0.88em; color: #888; margin-top: 4px; font-style: italic; }
  .footer {
    margin-top: 28px;
    text-align: center;
    font-size: 0.78em;
    color: #aaa;
    line-height: 1.6;
  }
  .progress-bar {
    background: #e0e0e0;
    border-radius: 8px;
    height: 8px;
    margin: 16px 0 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #004848;
    border-radius: 8px;
    width: 0%;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 0.78em;
    color: #888;
    text-align: right;
    margin-bottom: 12px;
  }
</style>
</head>
<body>
<div class="header">
  <h1>Hoofdstuk 13 &mdash; Datum & tijd</h1>
  <h2>🔊 -er/-ier uitgang = 'é'</h2>
  <p>Werkwoorden en woorden op -er of -ier eindigen altijd op een gesloten 'é'.</p>
</div>

<div class="note">Tik op een woord om het te horen. Zet uw telefoon niet op stil.</div>

<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
<div class="progress-label" id="progress-label">0 van 5 geluisterd</div>

<div class="words" id="words"></div>

<div class="footer">
  Francais Pratique voor Nederlanders &bull; H13
</div>

<script>
// [display_word, phonetic_hint, spoken_sentence]
// The synthesizer speaks the full sentence — words sound natural in context.
const words = [["parler", "par-lé — -er wordt -é", "Je voudrais parler français."], ["janvier", "jan-vjé", "Mon anniversaire est en janvier."], ["février", "fév-rjé", "Il fait froid en février."], ["premier", "pre-mjé", "C'est le premier janvier."], ["rentrer", "ran-tré", "Je dois rentrer à la maison."]];

const container = document.getElementById('words');

let frVoice = null;
function loadVoice() {
  const all = window.speechSynthesis.getVoices();
  frVoice = all.find(v => v.lang === 'fr-FR' && /amelie|thomas|audrey|lea|pierre/i.test(v.name))
         || all.find(v => v.lang === 'fr-FR')
         || all.find(v => v.lang === 'fr-BE')
         || all.find(v => v.lang.startsWith('fr'))
         || null;
}
window.speechSynthesis.onvoiceschanged = loadVoice;
setTimeout(loadVoice, 300);

function speak(word, btn) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  // Trailing ellipsis gives the synthesizer a natural pause after the word
  // so it doesn't cut off abruptly — especially important for short words.
  const utt = new SpeechSynthesisUtterance(word + '...');
  utt.lang   = 'fr-FR';
  utt.rate   = 0.75;
  utt.pitch  = 1.0;
  utt.volume = 1.0;
  if (frVoice) utt.voice = frVoice;
  btn.classList.add('playing');
  btn.querySelector('.icon').textContent = '🔈';
  utt.onend = () => {
    btn.classList.remove('playing');
    btn.querySelector('.icon').textContent = '▶';
  };
  window.speechSynthesis.speak(utt);
}

const totalWords = words.length;
const heard = new Set();

function updateProgress() {
  const pct = Math.round((heard.size / totalWords) * 100);
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('progress-label').textContent =
    heard.size + ' van ' + totalWords + ' geluisterd' +
    (heard.size === totalWords ? ' — klaar! ✓' : '');
}

words.forEach(([fr, ph, _sentence], idx) => {
  const btn = document.createElement('button');
  btn.className = 'word-btn';
  btn.innerHTML = `
    <span class="icon">▶</span>
    <span class="text">
      <div class="fr">${fr}</div>
      <div class="ph">${ph}</div>
    </span>`;
  btn.addEventListener('click', () => {
    speak(fr, btn);
    heard.add(idx);
    updateProgress();
  });
  container.appendChild(btn);
});
</script>
</body>
</html>
